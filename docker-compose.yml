version: "3.9"

services:
  homeassistant:
    container_name: homeassistant-dev
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./custom_components/unifi_access:/config/custom_components/unifi_access
      - ./config:/config
    ports:
      - "8123:8123"
    restart: unless-stopped
